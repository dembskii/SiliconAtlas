<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Technologii - Panel Administratora</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
            color: #000;
        }
        .navbar {
            background: #003366;
            color: white;
            padding: 10px 20px;
            border-bottom: 1px solid #000;
        }
        .navbar h1 {
            margin: 0;
            display: inline-block;
            font-size: 18px;
        }
        .navbar nav {
            display: inline-block;
            float: right;
        }
        .navbar nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            padding: 5px 10px;
        }
        .navbar nav a:hover {
            background: #005580;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 10px;
        }
        .card {
            border: 1px solid #ccc;
            padding: 15px;
            background: #f9f9f9;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #e0e0e0;
            padding: 8px;
            text-align: left;
            border: 1px solid #ccc;
            font-weight: bold;
        }
        td {
            padding: 8px;
            border: 1px solid #ccc;
        }
        tr:nth-child(even) {
            background: #f0f0f0;
        }
        .btn {
            padding: 8px 12px;
            text-decoration: none;
            border: 1px solid #666;
            cursor: pointer;
            display: inline-block;
            margin-right: 5px;
        }
        .btn-primary {
            background: #0066cc;
            color: white;
            border: 1px solid #0066cc;
        }
        .btn-danger {
            background: #cc0000;
            color: white;
            border: 1px solid #cc0000;
        }
        .alert {
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
        }
        .alert-success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .alert-error {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>CPU Database - Panel Administratora</h1>
        <nav>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/cpus}">CPU</a>
            <a th:href="@{/admin/manufacturers}">Producenci</a>
            <a th:href="@{/admin/technologies}">Technologie</a>
        </nav>
    </div>

    <div class="container">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <div class="card">
            <div class="card-header">
                <h2>Lista technologii</h2>
                <a th:href="@{/admin/technologies/new}" class="btn btn-primary">Dodaj technologię</a>
            </div>

            <table th:if="${not #lists.isEmpty(technologies)}">
                <thead>
                    <tr>
                        <th>Nazwa</th>
                        <th>Opis</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="technology : ${technologies}">
                        <td><strong th:text="${technology.name}">SMT</strong></td>
                        <td th:text="${technology.description ?: 'Brak opisu'}">Simultaneous Multithreading</td>
                        <td>
                            <form th:action="@{/admin/technologies/delete/{id}(id=${technology.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-danger" 
                                        onclick="return confirm('Czy na pewno chcesz usu nąć tę technologię?')">Usuń</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(technologies)}" class="empty-state">
                <h3>Brak technologii w bazie</h3>
                <p style="margin: 1rem 0;">Dodaj pierwszą technologię, aby móc przypisywać ją do CPU.</p>
                <a th:href="@{/admin/technologies/new}" class="btn btn-primary">Dodaj technologię</a>
            </div>
        </div>
    </div>
</body>
</html>
