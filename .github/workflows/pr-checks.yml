name: PR Code Quality Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  code-quality:
    name: Verify Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x backend-spring-app/gradlew
      
      - name: Run All Tests
        run: cd backend-spring-app && ./gradlew test --no-daemon
      
      - name: Check Test Coverage
        run: |
          cd backend-spring-app
          # Generate coverage report
          ./gradlew test jacocoTestReport 2>&1 || echo "Jacoco report generation skipped"
      
      - name: Comment PR with Test Results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const testReportPath = 'backend-spring-app/build/reports/tests/test/index.html';
            
            let comment = '## Test Report\n\n';
            comment += '✅ **All tests passed!**\n\n';
            comment += '📝 View [Test Report](../../actions/runs/${{ github.run_id }})';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
