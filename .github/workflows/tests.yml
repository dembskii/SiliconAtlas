name: Run Tests on Push

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run JUnit Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [21]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x backend-spring-app/gradlew
      
      - name: Run Domain Tests
        run: cd backend-spring-app && ./gradlew test --tests "com.cpu.management.domain.*" -v
        continue-on-error: false
      
      - name: Run Mapper Tests
        run: cd backend-spring-app && ./gradlew test --tests "com.cpu.management.mapper.*" -v
        continue-on-error: false
      
      - name: Run Service Tests
        run: cd backend-spring-app && ./gradlew test --tests "com.cpu.management.service.*" -v
        continue-on-error: false
      
      - name: Run Controller Tests
        run: cd backend-spring-app && ./gradlew test --tests "com.cpu.management.controller.*" -v
        continue-on-error: false
      
      - name: Run Exception Tests
        run: cd backend-spring-app && ./gradlew test --tests "com.cpu.management.exception.*" -v
        continue-on-error: false
      
      - name: Generate Test Report
        if: always()
        run: cd backend-spring-app && ./gradlew test --no-daemon 2>&1 || true
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: backend-spring-app/build/reports/tests/
      
      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: backend-spring-app/build/test-results/**/*.xml
          check_name: JUnit Test Results

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x backend-spring-app/gradlew
      
      - name: Build with Gradle
        run: cd backend-spring-app && ./gradlew build -x test
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: spring-boot-jar
          path: backend-spring-app/build/libs/*.jar
