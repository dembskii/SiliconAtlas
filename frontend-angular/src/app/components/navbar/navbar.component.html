<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/" class="logo">
      <span class="logo-icon">⚙</span>
      <span class="logo-text">CPU Manager</span>
    </a>
    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="menuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  <div class="navbar-menu" [class.open]="menuOpen">
    <div class="navbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Strona główna</a>
      @if (authService.isLoggedIn()) {
        <a routerLink="/app" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
        <a routerLink="/app/cpu" routerLinkActive="active">Procesory</a>
        <a routerLink="/app/manufacturers" routerLinkActive="active">Producenci</a>
        <a routerLink="/app/technologies" routerLinkActive="active">Technologie</a>
      }
    </div>
    <div class="navbar-auth">
      @if (authService.isLoggedIn()) {
        <span class="user-info">{{ (authService.currentUser$ | async)?.username }}</span>
        @if (tokenExpiresAt) {
          <span 
            class="token-expiry" 
            [class.expiring]="isTokenExpiring"
            [title]="'Token wygasa: ' + (tokenExpiresAt | date:'dd.MM.yyyy HH:mm:ss')"
          >
            Wygasa: {{ tokenExpiresAt | date:'dd.MM HH:mm' }}
          </span>
        }
        <button class="btn btn-outline" (click)="logout()">Wyloguj</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active" class="btn btn-outline">Logowanie</a>
        <a routerLink="/register" routerLinkActive="active" class="btn btn-primary">Rejestracja</a>
      }
    </div>
  </div>
</nav>
