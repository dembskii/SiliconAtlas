spring.application.name=cpu-management-system

server.port=8080

# Disable Kafka configuration for tests (KafkaConsumerConfig will not be instantiated)
spring.kafka.enabled=false

# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/

# JWT Configuration
jwt.secret=cpu-management-system-secret-key-for-jwt-token-generation-and-validation-purposes
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Redis Configuration for tests
spring.redis.host=localhost
spring.redis.port=6379
