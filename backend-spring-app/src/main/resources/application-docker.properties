# ============================================
# Docker Profile Configuration
# For use in Docker environment
# ============================================

spring.application.name=cpu-management-system

# Server Configuration
server.port=8080
server.servlet.context-path=/

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/cpu_management_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cpu_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ============================================
# JPA/Hibernate Configuration
# Hibernate 7.x auto-detects dialect from JDBC URL
# ============================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# Redis Configuration
# ============================================
spring.cache.type=redis
spring.redis.host=${SPRING_REDIS_HOST:redis}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.timeout=2000
spring.cache.redis.time-to-live=600000


spring.cache.redis.key-prefix=cache:
spring.cache.redis.use-key-prefix=true


rate.limit.enabled=true
rate.limit.requests=100
rate.limit.duration=1
rate.limit.duration-unit=MINUTES
rate.limit.key-prefix=ratelimit:
rate.limit.exclude-paths=/api/auth/login,/api/auth/register

# ============================================
# Logging Configuration
# ============================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.cpu.management=${LOGGING_LEVEL_COM_CPU_MANAGEMENT:INFO}
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# Thymeleaf Configuration
# ============================================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET:cpu-management-system-secret-key-for-jwt-token-generation-and-validation-purposes}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================
