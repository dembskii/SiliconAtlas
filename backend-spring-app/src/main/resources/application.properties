spring.application.name=cpu-management-system

server.port=8080

# Database Configuration (local PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/cpu_management_db
spring.datasource.username=cpu_admin
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis Configuration (spring.data.redis.* for Spring Boot 3+/4)
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.redis.key-prefix=cache:
spring.cache.redis.use-key-prefix=true

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# JWT Configuration
jwt.secret=${JWT_SECRET:cpu-management-system-secret-key-for-jwt-token-generation-and-validation-purposes}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Rate Limit Configuration
rate.limit.enabled=true
rate.limit.requests=100
rate.limit.duration=1
rate.limit.duration-unit=MINUTES
rate.limit.key-prefix=ratelimit:
rate.limit.exclude-paths=/api/auth/login,/api/auth/register