<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj Producenta - Panel Administratora</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
            color: #000;
        }
        .navbar {
            background: #003366;
            color: white;
            padding: 10px 20px;
            border-bottom: 1px solid #000;
        }
        .navbar h1 {
            margin: 0;
            display: inline-block;
            font-size: 18px;
        }
        .navbar nav {
            display: inline-block;
            float: right;
        }
        .navbar nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            padding: 5px 10px;
        }
        .navbar nav a:hover {
            background: #005580;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 10px;
        }
        .card {
            border: 1px solid #ccc;
            padding: 15px;
            background: #f9f9f9;
        }
        .card h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #999;
            font-size: 14px;
        }
        .btn {
            padding: 8px 12px;
            text-decoration: none;
            border: 1px solid #666;
            cursor: pointer;
            display: inline-block;
            margin-right: 5px;
        }
        .btn-primary {
            background: #0066cc;
            color: white;
            border: 1px solid #0066cc;
        }
        .btn-secondary {
            background: #666;
            color: white;
            border: 1px solid #666;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
    <link rel="stylesheet" href="/css/notifications.css">
</head>
<body>
    <div class="navbar">
        <h1>SiliconAtlas - Panel Administratora</h1>
        <nav>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/cpus}">CPU</a>
            <a th:href="@{/admin/manufacturers}">Producenci</a>
            <a th:href="@{/admin/technologies}">Technologie</a>
            <a href="#" onclick="handleLogout(); return false;">Wyloguj się</a>
        </nav>
    </div>

    <div class="container">
        <div class="card">
            <h2>Dodaj nowego producenta</h2>

            <form th:action="@{/admin/manufacturers/new}" method="post" th:object="${manufacturer}">
                <div class="form-group">
                    <label for="name">Nazwa producenta *</label>
                    <input type="text" id="name" th:field="*{name}" required placeholder="np. AMD, Intel">
                </div>

                <div class="form-group">
                    <label for="country">Kraj</label>
                    <input type="text" id="country" th:field="*{country}" placeholder="np. USA, Taiwan">
                </div>

                <div class="form-group">
                    <label for="foundedYear">Rok założenia</label>
                    <input type="number" id="foundedYear" th:field="*{foundedYear}" min="1900" max="2030" placeholder="np. 1969">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Zapisz</button>
                    <a th:href="@{/admin/manufacturers}" class="btn btn-secondary">Anuluj</a>
                </div>
            </form>
        </div>
    </div>

    <!-- WebSocket Notifications -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="/js/notification-websocket.js"></script>
    <script src="/js/auth-utils.js"></script>
    <script>
        function handleLogout() {
            if (confirm('Czy na pewno chcesz się wylogować?')) {
                fetch('/api/v1/auth/logout', {
                    method: 'POST'
                }).finally(() => {
                    authUtils.clearToken();
                    window.location.href = '/login';
                });
            }
        }
    </script>
</body>
</html>
