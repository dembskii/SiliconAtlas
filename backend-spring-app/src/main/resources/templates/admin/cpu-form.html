<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edytuj CPU' : 'Dodaj CPU'">Formularz CPU</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
            color: #000;
        }
        .navbar {
            background: #003366;
            color: white;
            padding: 10px 20px;
            border-bottom: 1px solid #000;
        }
        .navbar h1 {
            margin: 0;
            display: inline-block;
            font-size: 18px;
        }
        .navbar nav {
            display: inline-block;
            float: right;
        }
        .navbar nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            padding: 5px 10px;
        }
        .navbar nav a:hover {
            background: #005580;
        }
        .container {
            max-width: 700px;
            margin: 20px auto;
            padding: 0 10px;
        }
        .card {
            border: 1px solid #ccc;
            padding: 15px;
            background: #f9f9f9;
        }
        .card h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #999;
            font-size: 14px;
        }
        .form-group small {
            display: block;
            margin-top: 3px;
            color: #666;
            font-size: 12px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .btn {
            padding: 8px 12px;
            text-decoration: none;
            border: 1px solid #666;
            cursor: pointer;
            display: inline-block;
            margin-right: 5px;
        }
        .btn-primary {
            background: #0066cc;
            color: white;
            border: 1px solid #0066cc;
        }
        .btn-secondary {
            background: #666;
            color: white;
            border: 1px solid #666;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .checkbox-group {
            border: 1px solid #ccc;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            background: #f9f9f9;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 5px 10px;
            margin-bottom: 5px;
        }
        .checkbox-item input {
            margin-right: 8px;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>CPU Database - Panel Administratora</h1>
        <nav>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/cpus}">CPU</a>
            <a th:href="@{/admin/manufacturers}">Producenci</a>
            <a th:href="@{/admin/technologies}">Technologie</a>
        </nav>
    </div>

    <div class="container">
        <div class="card">
            <h2 th:text="${isEdit} ? '✏️ Edytuj CPU' : '➕ Dodaj nowy CPU'">Formularz CPU</h2>

            <form th:action="${isEdit} ? @{/admin/cpus/edit/{id}(id=${cpu.id})} : @{/admin/cpus/new}" 
                  method="post" th:object="${cpu}">
                
                <div class="form-group">
                    <label for="model">Nazwa modelu *</label>
                    <input type="text" id="model" th:field="*{model}" required 
                           placeholder="np. Ryzen 7 5800X">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cores">Liczba rdzeni *</label>
                        <input type="number" id="cores" th:field="*{cores}" required min="1" max="128"
                               placeholder="np. 8">
                    </div>
                    <div class="form-group">
                        <label for="threads">Liczba wątków *</label>
                        <input type="number" id="threads" th:field="*{threads}" required min="1" max="256"
                               placeholder="np. 16">
                    </div>
                </div>

                <div class="form-group">
                    <label for="frequencyGhz">Częstotliwość (GHz) *</label>
                    <input type="number" id="frequencyGhz" th:field="*{frequencyGhz}" required 
                           step="0.1" min="0.1" max="10" placeholder="np. 3.8">
                </div>

                <!-- Specyfikacja CPU -->
                <div class="card" style="background: #e8f4f8; margin: 20px 0;">
                    <h3 style="margin: 0 0 15px 0; font-size: 16px;">📋 Specyfikacja procesora</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="spec-cache-l1">Cache L1 (KB)</label>
                            <input type="number" id="spec-cache-l1" name="specification.cacheL1KB" 
                                   th:value="${cpu.specification?.cacheL1KB}" min="0" placeholder="np. 512">
                            <small>Opcjonalne</small>
                        </div>
                        <div class="form-group">
                            <label for="spec-cache-l2">Cache L2 (KB)</label>
                            <input type="number" id="spec-cache-l2" name="specification.cacheL2KB" 
                                   th:value="${cpu.specification?.cacheL2KB}" min="0" placeholder="np. 4096">
                            <small>Opcjonalne</small>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="spec-cache-l3">Cache L3 (MB)</label>
                            <input type="number" id="spec-cache-l3" name="specification.cacheL3MB" 
                                   th:value="${cpu.specification?.cacheL3MB}" min="0" placeholder="np. 32">
                            <small>Opcjonalne</small>
                        </div>
                        <div class="form-group">
                            <label for="spec-tdp">Moc TDP (W)</label>
                            <input type="number" id="spec-tdp" name="specification.tdpWatts" 
                                   th:value="${cpu.specification?.tdpWatts}" min="0" max="500" placeholder="np. 105">
                            <small>Opcjonalne</small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="spec-socket">Typ gniazda (Socket)</label>
                        <input type="text" id="spec-socket" name="specification.socketType" 
                               th:value="${cpu.specification?.socketType}" placeholder="np. AM5, LGA1700">
                        <small>Opcjonalne</small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="manufacturerId">Producent</label>
                    <select id="manufacturerId" name="manufacturerId">
                        <option value="">-- Wybierz producenta --</option>
                        <option th:each="manufacturer : ${manufacturers}" 
                                th:value="${manufacturer.id}" 
                                th:text="${manufacturer.name}"
                                th:selected="${isEdit and cpu.manufacturer != null and cpu.manufacturer.id == manufacturer.id}">AMD</option>
                    </select>
                    <small>Opcjonalne</small>
                </div>

                <div class="form-group">
                    <label>Technologie</label>
                    <div class="checkbox-group" th:if="${not #lists.isEmpty(technologies)}">
                        <div class="checkbox-item" th:each="technology : ${technologies}">
                            <input type="checkbox" name="technologyIds" th:value="${technology.id}" 
                                   th:id="'tech-' + ${technology.id}"
                                   th:checked="${isEdit and cpu.technologies != null and #lists.contains(cpu.technologies, technology)}">
                            <label th:for="'tech-' + ${technology.id}" th:text="${technology.name}">SMT</label>
                        </div>
                    </div>
                    <p th:if="${#lists.isEmpty(technologies)}" style="color: #888;">
                        Brak dostępnych technologii. <a th:href="@{/admin/technologies/new}">Dodaj technologię</a>
                    </p>
                    <small>Opcjonalne - możesz wybrać wiele technologii</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <span th:text="${isEdit} ? '💾 Zapisz zmiany' : '➕ Dodaj CPU'">Zapisz</span>
                    </button>
                    <a th:href="@{/admin/cpus}" class="btn btn-secondary">❌ Anuluj</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
