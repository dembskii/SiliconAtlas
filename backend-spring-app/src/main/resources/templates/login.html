<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - SiliconAtlas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            padding: 20px;
        }

        .login-container {
            background: #f9f9f9;
            padding: 40px;
            border: 1px solid #ccc;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #003366;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #333;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #000;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: none;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #0066cc;
            color: white;
            border: 1px solid #0066cc;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #0052a3;
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #333;
        }

        .form-footer a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-content.loading .spinner {
            display: block;
        }

        .btn-content.loading .btn-text {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>SiliconAtlas</h1>
            <p>Zaloguj się do panelu administratora</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Nazwa użytkownika</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Wpisz swoją nazwę użytkownika"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Hasło</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Wpisz swoje hasło"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn">
                <div class="btn-content">
                    <span class="btn-text">Zaloguj się</span>
                    <div class="spinner"></div>
                </div>
            </button>
        </form>

        <div class="form-footer">
            Nie masz konta? <a href="/register">Zarejestruj się</a>
        </div>
    </div>

    <script src="/js/auth-utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
